version: "3.9"

services:
  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      PROJECT_NAME: demo-app
      SECRET_KEY: iunYw68SjSdCHM6vdWQiJ0xDzyL0OKxnMO-1cUhMw1Q
      AUTO_MIGRATE: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/industry_ai
      DATABASE_PROVIDER: postgresql
      REDIS_URL: redis://redis:6379/0
      CACHE_PROVIDER: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QUEUE_PROVIDER: celery
      VECTOR_DB: qdrant
      VECTORSTORE_PROVIDER: qdrant
      LLM_PROVIDER: echo
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      PROJECT_NAME: demo-app
      SECRET_KEY: iunYw68SjSdCHM6vdWQiJ0xDzyL0OKxnMO-1cUhMw1Q
      AUTO_MIGRATE: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/industry_ai
      DATABASE_PROVIDER: postgresql
      REDIS_URL: redis://redis:6379/0
      CACHE_PROVIDER: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QUEUE_PROVIDER: celery
      VECTOR_DB: qdrant
      VECTORSTORE_PROVIDER: qdrant
      LLM_PROVIDER: echo
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: industry_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d industry_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: